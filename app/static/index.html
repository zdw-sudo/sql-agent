<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Agent · 智能问数</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --error: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    header {
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    header p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .badge {
      display: inline-block;
      background: #172554;
      color: #93c5fd;
      font-size: 0.75rem;
      padding: 2px 10px;
      border-radius: 999px;
      margin-top: 10px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      min-height: 88px;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px 14px;
      font-size: 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: var(--accent); }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip {
      background: #0f172a;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .status {
      font-size: 0.875rem;
      color: var(--muted);
    }

    .status.loading { color: #fbbf24; }
    .status.error { color: var(--error); }
    .status.ok { color: var(--success); }

    .section-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .answer {
      font-size: 1.05rem;
      white-space: pre-wrap;
    }

    pre {
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
      font-size: 0.85rem;
      line-height: 1.5;
      color: #a5f3fc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }

    th {
      background: #0f172a;
      color: var(--muted);
      font-weight: 600;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .step {
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
    }

    .step strong { color: #93c5fd; }

    .meta {
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 8px;
    }

    .hidden { display: none; }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 24px;
    }

    footer a { color: #93c5fd; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>SQL Agent · 智能问数</h1>
      <p>输入自然语言问题，Agent 自动生成 SQL 并返回分析结果</p>
      <span class="badge">FastAPI + DeepSeek + ReAct</span>
    </header>

    <div class="card">
      <label for="question">你的问题</label>
      <textarea id="question" placeholder="例如：销量最高的3个产品是什么？"></textarea>
      <div class="chips">
        <span class="chip" data-q="销量最高的3个产品是什么？">销量 TOP3</span>
        <span class="chip" data-q="每个城市有多少用户？">城市用户数</span>
        <span class="chip" data-q="2024年1月的总销售额是多少？">1月销售额</span>
        <span class="chip" data-q="哪个品类的平均单价最高？">品类均价</span>
      </div>
      <div class="actions">
        <button id="submit">开始查询</button>
        <span id="status" class="status"></span>
      </div>
    </div>

    <div id="result" class="hidden">
      <div class="card">
        <div class="section-title">回答</div>
        <div id="answer" class="answer"></div>
        <div class="meta">
          <span id="latency"></span>
          <span id="trace"></span>
        </div>
      </div>

      <div class="card" id="sql-card">
        <div class="section-title">生成的 SQL</div>
        <pre id="sql"></pre>
      </div>

      <div class="card hidden" id="rows-card">
        <div class="section-title">查询结果</div>
        <div id="rows-wrap"></div>
      </div>

      <div class="card hidden" id="steps-card">
        <div class="section-title">ReAct 推理步骤</div>
        <div id="steps" class="steps"></div>
      </div>
    </div>

    <footer>
      API 文档：<a href="/docs" target="_blank">/docs</a>
    </footer>
  </div>

  <script>
    const questionEl = document.getElementById("question");
    const submitBtn = document.getElementById("submit");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");

    document.querySelectorAll(".chip").forEach((chip) => {
      chip.addEventListener("click", () => {
        questionEl.value = chip.dataset.q;
        questionEl.focus();
      });
    });

    questionEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) submitQuery();
    });

    submitBtn.addEventListener("click", submitQuery);

    async function submitQuery() {
      const question = questionEl.value.trim();
      if (!question) {
        setStatus("请输入问题", "error");
        return;
      }

      submitBtn.disabled = true;
      setStatus("Agent 正在思考，请稍候…", "loading");
      resultEl.classList.add("hidden");

      try {
        const res = await fetch("/api/v1/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || "请求失败");
        }

        renderResult(data);
        setStatus(`完成 · ${data.latency_ms}ms`, "ok");
      } catch (err) {
        setStatus(err.message || "查询失败", "error");
      } finally {
        submitBtn.disabled = false;
      }
    }

    function setStatus(text, type) {
      statusEl.textContent = text;
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function renderResult(data) {
      document.getElementById("answer").textContent = data.answer || "（无回答）";
      document.getElementById("latency").textContent = `耗时 ${data.latency_ms} ms`;
      document.getElementById("trace").textContent = `trace: ${data.trace_id}`;

      const sqlCard = document.getElementById("sql-card");
      if (data.sql) {
        document.getElementById("sql").textContent = data.sql;
        sqlCard.classList.remove("hidden");
      } else {
        sqlCard.classList.add("hidden");
      }

      const rowsCard = document.getElementById("rows-card");
      const rowsWrap = document.getElementById("rows-wrap");
      if (data.rows && data.rows.length > 0) {
        rowsWrap.innerHTML = buildTable(data.rows);
        rowsCard.classList.remove("hidden");
      } else {
        rowsWrap.innerHTML = "";
        rowsCard.classList.add("hidden");
      }

      const stepsCard = document.getElementById("steps-card");
      const stepsEl = document.getElementById("steps");
      if (data.steps && data.steps.length > 0) {
        stepsEl.innerHTML = data.steps.map(renderStep).join("");
        stepsCard.classList.remove("hidden");
      } else {
        stepsEl.innerHTML = "";
        stepsCard.classList.add("hidden");
      }

      resultEl.classList.remove("hidden");
    }

    function buildTable(rows) {
      const cols = Object.keys(rows[0]);
      const thead = `<tr>${cols.map((c) => `<th>${escapeHtml(c)}</th>`).join("")}</tr>`;
      const tbody = rows
        .map(
          (row) =>
            `<tr>${cols.map((c) => `<td>${escapeHtml(String(row[c] ?? ""))}</td>`).join("")}</tr>`
        )
        .join("");
      return `<table><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
    }

    function renderStep(step) {
      if (step.type === "tool_call") {
        const input = JSON.stringify(step.input || {});
        const obs = (step.observation || "").slice(0, 200);
        return `<div class="step"><strong>Step ${step.step}</strong> · 工具 <code>${escapeHtml(step.tool)}</code><br>输入: ${escapeHtml(input)}<br>观察: ${escapeHtml(obs)}${obs.length >= 200 ? "…" : ""}</div>`;
      }
      return `<div class="step"><strong>Step ${step.step}</strong> · ${escapeHtml(step.type)}<br>${escapeHtml(step.content || "")}</div>`;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
